name: Ultimate Tmate Session

on: 
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  tmate-session:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Massive Package List
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            selenium playwright beautifulsoup4 requests aiohttp scrapy \
            pandas numpy polars matplotlib seaborn scikit-learn \
            fastapi uvicorn flask django \
            tqdm colorama python-dotenv pyyaml \
            sqlalchemy pymongo redis \
            pillow opencv-python

      - name: Install Playwright Browsers and System Deps
        run: |
          npx playwright install --with-deps

      - name: Start Tmate Session
        uses: mxschmitt/action-tmate@v3
        if: always() # Ensures the session starts even if an install step fails
        with:
          limit-access-to-actor: true
          
