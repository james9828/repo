name: Debug Session

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH + ngrok
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl jq
          sudo mkdir -p /run/sshd
          echo "runner:runner" | sudo chpasswd
          sudo service ssh start

          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/ngrok

      - name: Start ngrok TCP tunnel
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_AUTHTOKEN"
          nohup ngrok tcp 22 >/tmp/ngrok.log 2>&1 &
          sleep 12
          cat /tmp/ngrok.log || true

      - name: Grab SSH TCP Session
        run: |
          for i in {1..15}; do
            ENDPOINT=$(curl -s http://127.0.0.1:4040/api/tunnels \
              | jq -r '.tunnels[]? | select(.proto=="tcp") | .public_url' \
              | head -n1)

            if [ -n "$ENDPOINT" ] && [ "$ENDPOINT" != "null" ]; then
              break
            fi

            sleep 2
          done

          HOST=$(echo "$ENDPOINT" | sed 's#tcp://##' | cut -d: -f1)
          PORT=$(echo "$ENDPOINT" | sed 's#tcp://##' | cut -d: -f2)

          echo "======================="
          echo "SSH HOST: $HOST"
          echo "SSH PORT: $PORT"
          echo "USER: runner"
          echo "PASS: runner"
          echo "CONNECT:"
          echo "ssh runner@$HOST -p $PORT"
          echo "======================="

      - name: Keep Alive
        run: sleep infinity
