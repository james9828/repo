name: Supercharged Tmate Session

on: 
  workflow_dispatch:

jobs:
  heavy-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Using a modern stable version

      - name: Install Massive Package List
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            # --- Automation & Scraping ---
            selenium playwright beautifulsoup4 scrapy requests aiohttp \
            # --- Data Science & Analysis ---
            pandas numpy polars matplotlib seaborn scikit-learn \
            # --- Web Frameworks & APIs ---
            fastapi uvicorn flask django \
            # --- Utilities & Performance ---
            tqdm colorama python-dotenv pyyaml \
            # --- Database & Storage ---
            sqlalchemy pymongo redis \
            # --- Image & Media ---
            pillow opencv-python

      - name: Install Playwright & System Dependencies
        run: |
          # Installs Chromium, Firefox, Webkit and the Linux libs they need
          npx playwright install --with-deps

      - name: Setup Tmate Session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
