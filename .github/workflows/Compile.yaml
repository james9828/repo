name: Build Lune Android API33

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Lune
        uses: actions/checkout@v4
        with:
          repository: lune-org/lune
          fetch-depth: 0

      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget unzip zip \
            build-essential pkg-config \
            cmake ninja-build python3

      - name: Setup Latest Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lune-android-api33-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lune-android-api33-${{ runner.os }}-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download Android NDK r28
        run: |
          cd $HOME
          wget -q -O ndk.zip https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r28" >> $GITHUB_ENV

      - name: Build Lune
        env:
          RUSTFLAGS: -C lto=off
        run: |
          cargo ndk -t arm64-v8a -p 33 build --release -j2

      - name: Strip Binary
        run: |
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          "$TOOLCHAIN/bin/llvm-strip" target/aarch64-linux-android/release/lune || true

      - name: Show Output
        run: |
          ls -lah target/aarch64-linux-android/release/lune

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lune-android-aarch64-api33
          path: target/aarch64-linux-android/release/lune
