name: Build datasets wheel (cp313 aarch64 android)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Clone datasets and strip heavy deps
        run: |
          git clone https://github.com/huggingface/datasets.git
          sed -i '/pyarrow/d' datasets/setup.py || true
          sed -i '/pyarrow/d' datasets/pyproject.toml || true

      - name: Build Android aarch64 wheel
        run: cibuildwheel --platform android datasets
        env:
          CIBW_BUILD: "cp313-android_arm64_v8a"
          CIBW_BUILD_FRONTEND: "build"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: datasets-android-wheel
          path: wheelhouse/*.whl
