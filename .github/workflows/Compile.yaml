name: GPU Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check GPU / iGPU
        run: |
          echo "=== LSPCI (GPU devices) ==="
          lspci | grep -i -E "vga|3d|2d" || echo "No GPU found"

          echo ""
          echo "=== OpenGL Renderer ==="
          sudo apt update -y
          sudo apt install -y mesa-utils
          glxinfo | grep "OpenGL renderer" || echo "No OpenGL info"

          echo ""
          echo "=== NVIDIA Check ==="
          nvidia-smi || echo "No NVIDIA GPU"

          echo ""
          echo "=== CPU Info ==="
          lscpu | grep "Model name"

          echo ""
          echo "=== /dev/dri (iGPU hint) ==="
          ls /dev/dri || echo "No iGPU devices"
