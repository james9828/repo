name: Build Lune Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: lune-org/lune
          fetch-depth: 0

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y git unzip wget curl build-essential pkg-config cmake ninja-build python3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        run: |
          cd $HOME
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r28" >> $GITHUB_ENV

      - name: Configure Android toolchain (API 33)
        run: |
          echo "TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Lune for Android
        env:
          RUSTFLAGS: -C lto=off
        run: |
          cargo build --release --target aarch64-linux-android -j2

      - name: Strip binary
        run: |
          $TOOLCHAIN/bin/llvm-strip target/aarch64-linux-android/release/lune || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lune-android-aarch64-api33
          path: target/aarch64-linux-android/release/lune
