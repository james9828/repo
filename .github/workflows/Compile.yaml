name: LLaMA API (hf + cloudflared)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y wget tar

      - name: Download llama.cpp binary
        run: |
          wget https://github.com/ggml-org/llama.cpp/releases/download/b8892/llama-b8892-bin-ubuntu-x64.tar.gz
          tar -xzf llama-b8892-bin-ubuntu-x64.tar.gz

      - name: Find server binary
        run: |
          SERVER=$(find . -name llama-server | head -n 1)
          echo "SERVER=$SERVER" >> $GITHUB_ENV
          chmod +x "$SERVER"

      - name: Install cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Run server + tunnel
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # start server with HF model
          $SERVER -hf HauhauCS/Gemma-4-E4B-Uncensored-HauhauCS-Aggressive:Q4_K_M \
                  -c 2048 --port 8080 --host 0.0.0.0 &

          sleep 10

          ./cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
          sleep 10

          echo "=== PUBLIC URL ==="
          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' tunnel.log | head -n 1
          echo "=================="

          wait
