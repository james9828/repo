name: Build datasets wheel (android)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Clone datasets and strip heavy deps
        run: |
          git clone https://github.com/huggingface/datasets.git
          sed -i '/pyarrow/d' datasets/pyproject.toml || true
          sed -i '/pyarrow/d' datasets/setup.py || true

      - name: Build wheel
        run: |
          cd datasets
          python -m build --wheel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: datasets-wheel
          path: datasets/dist/*.whl
