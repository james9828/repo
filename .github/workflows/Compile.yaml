name: Build datasets wheel (cp313 aarch64 style)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel patchelf

      - name: Clone datasets repo
        run: git clone https://github.com/huggingface/datasets.git

      - name: Remove heavy deps (pyarrow etc)
        run: |
          sed -i '/pyarrow/d' datasets/setup.py || true
          sed -i '/pyarrow/d' datasets/pyproject.toml || true

      - name: Set up Android NDK toolchain
        run: |
          API_LEVEL=33
          NDK=$ANDROID_NDK_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          echo "CC=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV

      - name: Build wheel
        run: |
          cd datasets
          python -m build

      - name: Unpack wheel
        run: |
          mkdir unpacked
          for whl in datasets/dist/*.whl; do
            unzip -q "$whl" -d unpacked
          done

      - name: Bundle dependencies
        run: |
          mkdir -p unpacked/lib
          find unpacked -name "*.so" | while read so; do
            echo "Processing $so"
            ldd "$so" || true
            ldd "$so" | awk '{print $3}' | while read dep; do
              if [ -f "$dep" ]; then
                cp -n "$dep" unpacked/lib/ || true
              fi
            done
            patchelf --set-rpath '$ORIGIN:$ORIGIN/../lib' "$so"
          done

      - name: Strip binaries
        run: find unpacked -name "*.so" -exec strip --strip-unneeded {} \; || true

      - name: Repack and rename wheel
        run: |
          mkdir fixed
          cd unpacked
          zip -r ../fixed/package.whl .
          cd ..
          mv fixed/package.whl fixed/datasets-cp313-cp313-linux_aarch64.whl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: datasets-wheel
          path: fixed/*.whl
