name: System Info (MB/GB)

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest

    steps:
      - name: Show RAM and Storage in MB/GB
        run: |
          echo "=== RAM ==="
          free -m | awk '/Mem:/ {
            printf "Total: %.2f GB (%.0f MB)\n", $2/1024, $2;
            printf "Used:  %.2f GB (%.0f MB)\n", $3/1024, $3;
            printf "Free:  %.2f GB (%.0f MB)\n", $4/1024, $4;
          }'

          echo ""
          echo "=== Disk (Root /) ==="
          df -BM / | awk 'NR==2 {
            totalMB=$2+0; usedMB=$3+0; freeMB=$4+0;
            printf "Total: %.2f GB (%d MB)\n", totalMB/1024, totalMB;
            printf "Used:  %.2f GB (%d MB)\n", usedMB/1024, usedMB;
            printf "Free:  %.2f GB (%d MB)\n", freeMB/1024, freeMB;
          }'
