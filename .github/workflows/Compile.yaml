name: Build Lune Android API33

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Lune
        uses: actions/checkout@v4
        with:
          repository: lune-org/lune
          fetch-depth: 0

      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            curl \
            wget \
            unzip \
            zip \
            build-essential \
            pkg-config \
            cmake \
            ninja-build \
            python3

      - name: Setup Latest Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lune-android-api33-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lune-android-api33-${{ runner.os }}-

      - name: Download Android NDK r28
        run: |
          cd $HOME
          wget -q -O ndk.zip https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r28" >> $GITHUB_ENV

      - name: Configure Android Toolchain
        run: |
          echo "TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV

      - name: Configure rust-lld Linker
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
          [target.aarch64-linux-android]
          linker = "rust-lld"
          EOF

      - name: Build Lune
        env:
          RUSTFLAGS: -C lto=off
        run: |
          cargo build --release --target aarch64-linux-android -j2

      - name: Strip Binary
        run: |
          $TOOLCHAIN/bin/llvm-strip target/aarch64-linux-android/release/lune || true

      - name: Show Output
        run: |
          ls -lah target/aarch64-linux-android/release/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lune-android-aarch64-api33
          path: target/aarch64-linux-android/release/lune        uses: dtolnay/rust-toolchain@1.82.0
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo Registry + Git + Target
        uses: actions/cache@v4
