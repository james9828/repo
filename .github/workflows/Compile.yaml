name: LLaMA API (prebuilt + cloudflared)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y wget unzip

      - name: Download llama.cpp prebuilt
        run: |
          wget https://github.com/ggml-org/llama.cpp/releases/latest/download/llama-binaries-linux-x64.zip
          unzip llama-binaries-linux-x64.zip
          chmod +x llama-cli llama-server

      - name: Download model (working one)
        run: |
          mkdir -p models
          cd models
          wget https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-GGUF/resolve/main/tinyllama-1.1b-chat.Q4_K_M.gguf

      - name: Install cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Run server + tunnel
        run: |
          ./llama-server -m models/tinyllama-1.1b-chat.Q4_K_M.gguf -c 2048 --port 8080 &
          sleep 5

          ./cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
          sleep 10

          echo "=== PUBLIC URL ==="
          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' tunnel.log | head -n 1
          echo "=================="

          wait          cd llama.cpp

          # Start server (new binary path)
          ./build/bin/server -m ../models/gemma-4-e4b.Q4_K_M.gguf -c 2048 --port 8080 &
          sleep 5

          echo "Starting tunnel..."

          ../cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
          sleep 10

          echo "=== PUBLIC URL ==="
          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' tunnel.log | head -n 1
          echo "=================="

          wait
          # Start llama server
          ./server -m ../models/gemma-4-e4b.Q4_K_M.gguf -c 2048 --port 8080 &
          sleep 5

          echo "Starting tunnel..."

          # Start tunnel and capture URL
          ../cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &

          sleep 8

          echo "=== PUBLIC URL ==="
          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' tunnel.log | head -n 1
          
          echo "=================="

          # Keep job alive
          wait
