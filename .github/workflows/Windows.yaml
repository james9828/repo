name: Windows

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: windows-latest

    steps:
      - name: Setup SSH + ngrok
        shell: powershell
        run: |
          # Install SSH
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic

          # Strong password
          net user runneradmin "Runner@123456"

          # Firewall rule
          New-NetFirewallRule -Name sshd `
            -DisplayName "OpenSSH Server" `
            -Enabled True `
            -Direction Inbound `
            -Protocol TCP `
            -Action Allow `
            -LocalPort 22

          # Download ngrok
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip -Force
          $ngrok = Get-ChildItem -Recurse -Filter ngrok.exe | Select-Object -First 1
          Move-Item $ngrok.FullName C:\Windows\System32\ngrok.exe

      - name: Start ngrok + get endpoint (NO API)
        shell: powershell
        run: |
          # YOUR TOKEN (used directly)
          ngrok config add-authtoken "33YRiHe7UOwDPK8j1Q1xdImUvGk_7UQdSxqQMvy4GfYc1kRjN"

          # Start ngrok and log output
          Start-Process -FilePath "ngrok" `
            -ArgumentList "tcp 22" `
            -RedirectStandardOutput "ngrok.log" `
            -RedirectStandardError "ngrok.log" `
            -NoNewWindow

          # Wait for startup
          Start-Sleep -Seconds 15

          # Read log and extract tcp address
          $log = Get-Content ngrok.log -Raw

          if ($log -match "tcp://[0-9a-zA-Z\.\-]+:\d+") {
            $endpoint = $matches[0]
          } else {
            Write-Host "==== NGROK LOG ===="
            Write-Host $log
            throw "Failed to find ngrok TCP endpoint"
          }

          $endpoint = $endpoint -replace "tcp://", ""
          $parts = $endpoint.Split(":")
          $host = $parts[0]
          $port = $parts[1]

          echo "======================="
          echo "SSH HOST: $host"
          echo "SSH PORT: $port"
          echo "USER: runneradmin"
          echo "PASS: Runner@123456"
          echo "CONNECT:"
          echo "ssh runneradmin@$host -p $port"
          echo "======================="

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) { Start-Sleep -Seconds 60 }
